<mat-card>
  <mat-card-header>
    <mat-card-title>Create Poll</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Poll Title</mat-label>
        <input matInput formControlName="title" maxlength="200" />
        @if (form.get('title')?.hasError('required')) {
          <mat-error>Title is required.</mat-error>
        }
        @if (form.get('title')?.hasError('maxlength')) {
          <mat-error>Title must not exceed 200 characters.</mat-error>
        }
      </mat-form-field>

      <div>
        <mat-slide-toggle formControlName="isPublic">Public poll (visible to all users)</mat-slide-toggle>
      </div>

      @if (error) {
        <p>{{ error }}</p>
      }

      <div>
        @if (isLoading) {
          <mat-spinner diameter="24"></mat-spinner>
        } @else {
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Create Poll</button>
        }
      </div>
    </form>
  </mat-card-content>
</mat-card>
